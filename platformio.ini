; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[esp32_base]
framework = arduino
board = esp32dev
;platform = espressif32@~5.0.0
;platform = espressif32@4.4.0
platform = espressif32@3.4.0
;platform = https://github.com/platformio/platform-espressif32.git
build_flags =  -D CORE_DEBUG_LEVEL=3 
            ;   '-DVERSION="v7.0.0"'
              -Isrc
            ;   -Ilib/arduino-lmic/src/raspi
lib_deps =
    NeoPixelBus
;    h2zero/NimBLE-Arduino @ ~1.4.1
;    paulstoffregen/OneWire @ ~2.3.7
;    adafruit/Adafruit GFX Library @ ~1.11.5
;    adafruit/RTClib @ ~2.1.4
   ;links2004/WebSockets @ ~2.4.1
;    links2004/WebSockets @ ~2.3.5

board_build.partitions = min_spiffs.csv
monitor_speed = 115200
upload_speed = 921600
monitor_flags = 
   -f
   esp32_exception_decoder
; extra_scripts = post:extra_script.py


[env:tracker-t1000-e]
platform = platformio/nordicnrf52@^10.7.0
board = tracker-t1000-e
framework = arduino
build_flags = 
    -Isrc
    -Ivariants/tracker-t1000-e
debug_tool = jlink
; If not set we will default to uploading over serial (first it forces bootloader entry by talking 1200bps to cdcacm)
upload_protocol = nrfutil

[env:T-Beam-S3Core]
extends = esp32_base
build_flags =  ${esp32_base.build_flags}
               '-DENV="T-Beam-S3Core"'
               -DSH1106G
               -DAIRMODULE
               -DBOARD_HAS_PSRAM
               -DBLUETOOTH
               -DS3CORE
               -DARDUINO_USB_CDC_ON_BOOT=1 ;for output over USB-C
               -Ivariants/tbeam-s3-core
               -UWIFICLIENT_H
board = tbeam-s3-core
; change microcontroller
board_build.mcu = esp32s3
platform = espressif32 @ 6.7.0
board_build.partitions = 8mb_spiffs.csv
